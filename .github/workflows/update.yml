name: Actualizar Semáforo de Mercado

on:
  schedule:
    # Cada sábado a las 07:00h UTC (09:00h España verano)
    - cron: '0 7 * * 6'
  # También permite ejecutarlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install yfinance pandas pandas-datareader anthropic requests --quiet

      - name: Ejecutar semáforo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python src/semaforo.py

      - name: Commit y push del HTML actualizado
        run: |
          git config --global user.name 'Semáforo Bot'
          git config --global user.email 'semaforo@users.noreply.github.com'
          git add docs/index.html
          git diff --staged --quiet || git commit -m "🚦 Semáforo actualizado $(date +'%Y-%m-%d %H:%M UTC')"
          git push
